[build]
command = "npm run build"
publish = "dist"

# Removed SPA catch-all rewrite that forced all 404s to the homepage.
# Netlify will now serve the generated 404.html from Astro.

# API redirects for tracking
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200

[[redirects]]
  from = "/api/track-send"
  to = "/.netlify/functions/track-send"
  status = 200

[[redirects]]
  from = "/api/unsubscribe"
  to = "/.netlify/functions/unsubscribe"
  status = 200

[[redirects]]
  from = "/api/track-activity"
  to = "/.netlify/functions/track-activity"
  status = 200

[[redirects]]
  from = "/api/generate-email-pack"
  to = "/.netlify/functions/generate-email-pack"
  status = 200

[[redirects]]
  from = "/api/preview-email-pack"
  to = "/.netlify/functions/preview-email-pack"
  status = 200

[[redirects]]
  from = "/api/generate-page-content"
  to = "/.netlify/functions/generate-page-content"
  status = 200

[[redirects]]
  from = "/api/verify-admin-password"
  to = "/.netlify/functions/verify-admin-password"
  status = 200

[[redirects]]
  from = "/api/mailerlite-group-count"
  to = "/.netlify/functions/mailerlite-group-count"
  status = 200

[[redirects]]
  from = "/api/video-retention"
  to = "/.netlify/functions/video-retention"
  status = 200

[[redirects]]
  from = "/api/retention-auth"
  to = "/.netlify/functions/retention-auth"
  status = 200

[[redirects]]
  from = "/api/retention-data"
  to = "/.netlify/functions/retention-data"
  status = 200

# Redirections internes (priorité élevée)
[[redirects]]
  from = "/ssr-access"
  to = "/ssr-inscription"
  status = 301
  force = true

[[redirects]]
  from = "/ssr-access/"
  to = "/ssr-inscription"
  status = 301
  force = true

# Anciennes URLs webinaire → masterclass (query string conservée par Netlify)
[[redirects]]
  from = "/webinaire"
  to = "/masterclass"
  status = 301
  force = true

[[redirects]]
  from = "/webinaire/"
  to = "/masterclass"
  status = 301
  force = true

[[redirects]]
  from = "/webinaire/confirmation"
  to = "/masterclass/confirmation"
  status = 301
  force = true

[[redirects]]
  from = "/webinaire/confirmation/"
  to = "/masterclass/confirmation"
  status = 301
  force = true

[[redirects]]
  from = "/webinaire/session"
  to = "/masterclass/session"
  status = 301
  force = true

[[redirects]]
  from = "/webinaire/session/"
  to = "/masterclass/session"
  status = 301
  force = true

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.images]
compress = true

[functions]
  [functions.daily-views-collector]
    background = true
    timeout = 900  # 15 minutes en secondes

  [functions."generate-email-pack"]
    type = "background"
    timeout = 60

  # Dimanche 23h Paris.
  # CET => 22:00 UTC, CEST => 21:00 UTC. On planifie les 2 pour couvrir DST.
  [functions."transition-webinaire"]
    schedule = "0 21,22 * * 0"
